<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube AI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ea;
      --panel: #fffaf2;
      --surface: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --border: rgba(31, 35, 40, 0.12);
      --accent: #d94841;
      --accent-soft: rgba(217, 72, 65, 0.12);
      --bubble-user: #dfeeff;
      --bubble-ai: #f3f4f6;
      --bubble-error: #ffe8e6;
      --success: #1f7a4d;
      --warning: #9a5b00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 380px;
      min-height: 560px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top, #fff8ef 0%, var(--bg) 48%, #efe7da 100%);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 560px;
      padding: 14px;
      gap: 10px;
    }

    .topbar,
    .banner,
    .composer,
    .message,
    .chips button {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(31, 35, 40, 0.08);
    }

    .topbar {
      border-radius: 18px;
      padding: 14px;
    }

    .topbar-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
      box-shadow: 0 0 0 4px rgba(156, 163, 175, 0.18);
    }

    .status-dot.online {
      background: #2fbf71;
      box-shadow: 0 0 0 4px rgba(47, 191, 113, 0.16);
    }

    .status-dot.offline {
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.16);
    }

    .banner {
      display: none;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.4;
    }

    .banner.show {
      display: block;
    }

    .banner.warning {
      color: var(--warning);
      background: #fff7e7;
    }

    .banner.notice {
      color: var(--muted);
      background: #f6f7fb;
    }

    .messages {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 2px 2px 4px;
    }

    .empty-state {
      margin: auto 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px 8px;
    }

    .message {
      max-width: 88%;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--bubble-user);
    }

    .message.ai {
      align-self: flex-start;
      background: var(--bubble-ai);
    }

    .message.error {
      background: var(--bubble-error);
      color: #9b1c1c;
    }

    .list-num {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
    }

    .message strong {
      color: #1f2328;
      font-weight: 600;
    }

    .message em {
      color: var(--muted);
      font-style: italic;
    }

    .meta {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6b7280;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .chips.hidden {
      display: none;
    }

    .chips button {
      border-radius: 999px;
      padding: 10px 12px;
      border: 1px solid rgba(31, 35, 40, 0.1);
      background: rgba(255, 255, 255, 0.85);
      color: var(--text);
      font-size: 12px;
      text-align: left;
      cursor: pointer;
    }

    .composer {
      border-radius: 18px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .composer-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #question-input {
      flex: 1;
      resize: none;
      min-height: 54px;
      max-height: 118px;
      border-radius: 14px;
      border: 1px solid rgba(31, 35, 40, 0.12);
      padding: 12px 12px;
      font: inherit;
      line-height: 1.4;
      outline: none;
      background: rgba(255, 255, 255, 0.96);
    }

    #question-input:focus {
      border-color: rgba(217, 72, 65, 0.45);
      box-shadow: 0 0 0 4px rgba(217, 72, 65, 0.1);
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .counter {
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }

    .counter.visible {
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .icon-btn,
    .primary-btn {
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .icon-btn:disabled,
    .primary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .icon-btn:hover:not(:disabled),
    .primary-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      border: 1px solid rgba(31, 35, 40, 0.12);
    }

    .primary-btn {
      min-height: 38px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .primary-btn svg {
      display: block;
    }

    .clear-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(31, 35, 40, 0.12);
      padding: 0 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <div class="topbar-row">
        <div class="title-wrap">
          <h1>YouTube AI Assistant</h1>
          <div id="subtitle" class="subtitle">Detecting video...</div>
        </div>
        <div class="status">
          <span id="status-dot" class="status-dot"></span>
          <span id="status-label">Checking backend</span>
        </div>
      </div>
    </section>

    <div id="banner" class="banner"></div>

    <section id="messages-container" class="messages" aria-live="polite">
      <div id="empty-state" class="empty-state">Open a YouTube video and ask a question about it.</div>
    </section>

    <section id="chips" class="chips">
      <button type="button" data-chip="What is this video about?">What is this video about?</button>
      <button type="button" data-chip="Summarize the key points">Summarize the key points</button>
      <button type="button" data-chip="What are the main conclusions?">What are the main conclusions?</button>
      <button type="button" data-chip="List important timestamps">List important timestamps</button>
    </section>

    <section class="composer">
      <div class="composer-row">
        <textarea id="question-input" maxlength="500" placeholder="Ask about the video..."></textarea>
        <button id="send-btn" class="primary-btn" type="button" aria-label="Send question" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M1.5 8L14.5 1.5L10.8 14.5L7.8 9.2L1.5 8Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <div class="composer-actions">
        <div id="char-counter" class="counter"></div>
        <div class="actions">
          <button id="clear-btn" class="icon-btn clear-btn" type="button">Clear</button>
        </div>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
